name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Build extension bundle
        run: npm run build

      - name: Assemble demo into Storybook output
        run: |
          mkdir -p storybook-static/demo storybook-static/pages storybook-static/tokens
          cp demo/*.html demo/*.css demo/*.js demo/*.json storybook-static/demo/
          cp pages/watchlater.css pages/components.bundle.js storybook-static/pages/
          cp tokens/tokens.css storybook-static/tokens/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
