services:
  harvester:
    build: .
    image: wla-transcript-harvester:latest
    container_name: wla-transcript-harvester
    restart: unless-stopped
    ports:
      - "${WLA_HARVESTER_PORT:-47823}:47823"
    environment:
      - WLA_HARVESTER_PORT=47823
    healthcheck:
      test: ["CMD", "node", "-e", "import('http').then(h=>h.default.get('http://localhost:47823/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1)))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
